<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@700&family=Inter:wght@400;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <title>Desafio JS</title>
</head>

<body>
    <div class="container">
        <div class="container__conteudo">
            <div class="container__informacoes">
                <div class="container__texto">
                    <h2>Boas vindas ao desafio de programação!</h2>
                </div>
                <img src="./img/trophy.png" alt="ícone de um troféu" />
            </div>
            <div class="container__botoes">
                <button onclick="executarIMC()" class="container__botao">Calcular IMC</button>
                <button onclick="executarFatorial()" class="container__botao">Calcular Fatorial</button>
                <button onclick="executarDolarParaReal()" class="container__botao">Dólar para Real</button>
                <button onclick="executarPerimetro()" class="container__botao">Perímetro de um retangulo</button>
                <button onclick="executarAreaEPerimetro()" class="container__botao">Área e perímetro de um circulo</button>
                <button onclick="executarTabuada()" class="container__botao">Ver Tabuada</button>
            </div>

            <div class="container__resultado">
                <h2 id="resultado">Escolha uma opção acima</h2>
            </div>
        </div>
</div>
    </div>
    <script src="app.js" defer></script>
</body>

</html>
